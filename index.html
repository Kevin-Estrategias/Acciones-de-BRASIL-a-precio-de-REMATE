<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informe Brasil 2026 · EstrategiasLB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0F1A2E;
    --navy-2:#15223a;
    --navy-3:#1b2b48;
    --panel:#131f36;
    --gold:#D4AF37;
    --gold-soft:rgba(212,175,55,.13);
    --gold-line:rgba(212,175,55,.35);
    --blue:#1E40AF;
    --blue-2:#3455c6;
    --green:#37B24D;
    --red:#E05B5B;
    --amber:#E0A83B;
    --ink:#EDF2F9;
    --muted:#9DAECB;
    --muted-2:#6E82A5;
    --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.14);
    --radius:14px;
    --maxw:1160px;
    --font:'Montserrat',system-ui,-apple-system,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font);
    background:
      radial-gradient(1100px 600px at 80% -10%, rgba(30,64,175,.22), transparent 60%),
      radial-gradient(900px 500px at 0% 0%, rgba(212,175,55,.07), transparent 55%),
      var(--navy);
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  /* ---------- Topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:60;
    background:rgba(11,19,32,.86);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:60px;gap:16px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:.02em}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;flex:none;
    background:linear-gradient(140deg,var(--gold),#b8902a);
    display:grid;place-items:center;color:var(--navy);font-weight:900;font-size:14px;
  }
  .brand span{font-size:15px}
  .brand small{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .topbar .meta{font-size:11.5px;color:var(--muted);text-align:right;font-weight:600;letter-spacing:.03em}
  .topbar .meta b{color:var(--gold);font-weight:700}

  /* ---------- Hero ---------- */
  .hero{padding:52px 0 26px;position:relative;overflow:hidden}
  .flagline{display:flex;gap:6px;margin-bottom:20px}
  .flagline i{height:4px;border-radius:3px}
  .flagline i:nth-child(1){width:46px;background:var(--green)}
  .flagline i:nth-child(2){width:24px;background:var(--gold)}
  .flagline i:nth-child(3){width:14px;background:var(--blue-2)}
  .eyebrow{
    font-size:11.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(55,178,77,.16)}
  h1.hero-title{
    font-size:clamp(34px,6vw,62px);font-weight:900;line-height:1.02;letter-spacing:-.02em;
    margin-bottom:16px;
  }
  h1.hero-title .g{color:var(--gold)}
  .lede{font-size:clamp(15px,2.1vw,18px);color:var(--muted);max-width:640px;font-weight:500}
  .showtag{
    margin-top:22px;display:inline-flex;align-items:center;gap:10px;
    padding:8px 15px;border:1px solid var(--gold-line);border-radius:100px;
    background:var(--gold-soft);font-size:12.5px;font-weight:600;color:var(--gold);
  }

  /* ---------- Tabs ---------- */
  .tabsbar{position:sticky;top:60px;z-index:50;background:rgba(11,19,32,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);margin-top:30px}
  .tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    appearance:none;background:none;border:none;cursor:pointer;
    font-family:var(--font);color:var(--muted);font-weight:600;font-size:14px;
    padding:17px 20px;white-space:nowrap;position:relative;transition:color .2s;letter-spacing:.01em;
    display:flex;align-items:center;gap:9px;
  }
  .tab .num{font-size:11px;font-weight:800;color:var(--muted-2);transition:color .2s}
  .tab:hover{color:var(--ink)}
  .tab[aria-selected="true"]{color:var(--gold)}
  .tab[aria-selected="true"] .num{color:var(--gold)}
  .tab[aria-selected="true"]::after{
    content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;
    background:var(--gold);border-radius:2px;
  }
  .tab:focus-visible{outline:2px solid var(--blue-2);outline-offset:-3px;border-radius:6px}

  /* ---------- Panels ---------- */
  main{padding:44px 0 10px}
  .panel{display:none;animation:fade .4s ease both}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .section-head{margin-bottom:26px}
  .section-head .kick{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue-2);margin-bottom:9px}
  .section-head h2{font-size:clamp(24px,3.6vw,34px);font-weight:800;letter-spacing:-.01em}
  .section-head p{color:var(--muted);margin-top:9px;max-width:680px;font-weight:500;font-size:15px}

  /* ---------- Botón Refresh ---------- */
  .btn-refresh {
    background: var(--navy-2); color: var(--gold); border: 1px solid var(--gold-line);
    padding: 10px 18px; border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; margin-top: 10px;
  }
  .btn-refresh:hover { background: var(--gold-soft); }
  .btn-refresh:active { transform: scale(0.96); }

  /* ---------- Macro tab ---------- */
  .macro-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  .card{
    background:linear-gradient(180deg,var(--navy-3),var(--panel));
    border:1px solid var(--line);border-radius:var(--radius);padding:24px;
  }
  .card h3{font-size:16px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:9px}
  .card h3 .ic{width:26px;height:26px;border-radius:7px;background:var(--gold-soft);display:grid;place-items:center;color:var(--gold);font-size:14px;flex:none}
  .card p{color:var(--muted);font-size:14px}
  .card p + p{margin-top:11px}
  .card strong{color:var(--ink);font-weight:700}

  .poll{margin-top:16px;display:flex;flex-direction:column;gap:13px}
  .poll .row{display:grid;grid-template-columns:150px 1fr 44px;align-items:center;gap:12px}
  .poll .name{font-size:13px;font-weight:600}
  .poll .name small{display:block;color:var(--muted-2);font-weight:600;font-size:10.5px;letter-spacing:.04em}
  .bar{height:9px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
  .bar i{display:block;height:100%;border-radius:6px;width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1)}
  .poll .pct{font-size:13px;font-weight:800;text-align:right}

  .cal{display:flex;flex-direction:column;gap:0}
  .cal .ev{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
  .cal .ev:last-child{border-bottom:none}
  .cal .d{font-weight:900;color:var(--gold);font-size:13px;min-width:74px;letter-spacing:.02em}
  .cal .t{font-size:13.5px;color:var(--muted)}
  .cal .t b{color:var(--ink);font-weight:700;display:block;margin-bottom:1px}

  .press{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .chip-block{background:var(--navy-2);border:1px solid var(--line);border-radius:12px;padding:16px}
  .chip-block .lab{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:7px}
  .chip-block .txt{font-size:13.5px;color:var(--muted)}
  .chip-block .txt b{color:var(--ink)}

  .thesis{
    margin-top:18px;border:1px solid var(--gold-line);border-radius:var(--radius);
    background:linear-gradient(135deg,rgba(212,175,55,.12),rgba(30,64,175,.10));
    padding:26px 28px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;
  }
  .thesis .q{font-size:clamp(19px,2.8vw,26px);font-weight:800;line-height:1.25;flex:1;min-width:260px}
  .thesis .q em{color:var(--gold);font-style:normal}
  .thesis .sig{font-size:12px;color:var(--muted);font-weight:600;text-align:right}

  /* ---------- Assets tab ---------- */
  .assets{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .asset{
    background:linear-gradient(180deg,var(--navy-3),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:22px;position:relative;overflow:hidden;
    transition:transform .25s,border-color .25s,box-shadow .25s;
  }
  .asset:hover{transform:translateY(-3px);border-color:var(--gold-line);box-shadow:0 18px 40px -24px rgba(0,0,0,.7)}
  .asset .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px}
  .asset .tk{font-size:26px;font-weight:900;letter-spacing:-.01em;line-height:1}
  .asset .nm{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:4px}
  .asset .tag{font-size:12px;color:var(--muted);margin-top:9px;max-width:240px}
  .verdict{
    font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    padding:6px 11px;border-radius:100px;white-space:nowrap;flex:none;border:1px solid transparent;
  }
  .verdict.acc{color:var(--green);background:rgba(55,178,77,.12);border-color:rgba(55,178,77,.3)}
  .verdict.dgi{color:var(--gold);background:var(--gold-soft);border-color:var(--gold-line)}
  .verdict.pat{color:var(--amber);background:rgba(224,168,59,.12);border-color:rgba(224,168,59,.3)}
  .verdict.reb{color:var(--blue-2);background:rgba(52,85,198,.16);border-color:rgba(52,85,198,.4)}

  .ladder{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:6px 0 16px}
  .px{background:var(--navy-2);border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .px .l{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);margin-bottom:5px}
  .px .v{font-size:21px;font-weight:900;letter-spacing:-.01em}
  .px.obj .v{color:var(--gold)}
  .px .sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}

  .upwrap{margin:0 0 16px}
  .upwrap .ul{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .upwrap .ul b{color:var(--green)}
  .uptrack{height:8px;border-radius:6px;background:rgba(255,255,255,.07);overflow:hidden}
  .uptrack i{display:block;height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--green));transition:width 1.2s cubic-bezier(.2,.7,.2,1)}

  .divbox{
    display:flex;align-items:center;gap:11px;background:rgba(30,64,175,.1);
    border:1px solid rgba(52,85,198,.28);border-radius:11px;padding:12px 14px;margin-bottom:16px;
  }
  .divbox .di{width:30px;height:30px;border-radius:8px;background:rgba(52,85,198,.22);display:grid;place-items:center;font-size:15px;flex:none}
  .divbox .dt{font-size:12.5px;color:var(--muted)}
  .divbox .dt b{color:var(--ink);display:block;font-weight:700;font-size:13px}

  .funds{display:grid;grid-template-columns:1fr 1fr;gap:9px;border-top:1px solid var(--line);padding-top:15px}
  .fu{display:flex;flex-direction:column;gap:2px}
  .fu .fl{font-size:10.5px;color:var(--muted-2);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
